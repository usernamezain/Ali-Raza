<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ali Raza Kiryana Store POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Barcode Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Firebase SDK (Compat Version for easier integration) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
</head>


<body class="theme-light">
    <!-- App Container -->
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 id="view-title" data-i18n="app_title">Ali Raza Kiryana</h1>
                <div class="header-actions">
                    <button id="lang-toggle" class="icon-btn" title="Toggle Urdu/English"><i class="fa-solid fa-language"></i></button>
                    <button id="header-scan" class="icon-btn" title="Scan Barcode"><i class="fa-solid fa-barcode"></i></button>
                    <button id="notification-btn" class="icon-btn"><i class="fa-solid fa-bell"></i></button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-view" class="view-container">
            <!-- Dynamic Content Injected Here -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-view="home">
                <i class="fa-solid fa-house"></i>
                <span data-i18n="nav_home">Home</span>
            </button>
            <button class="nav-item" data-view="billing">
                <i class="fa-solid fa-receipt"></i>
                <span data-i18n="nav_billing">Billing</span>
            </button>
            <button class="nav-item" data-view="products">
                <i class="fa-solid fa-boxes-stacked"></i>
                <span data-i18n="nav_inventory">Inventory</span>
            </button>
            <button class="nav-item" data-view="khata">
                <i class="fa-solid fa-address-book"></i>
                <span data-i18n="nav_khata">Khata</span>
            </button>
            <button class="nav-item" data-view="settings">
                <i class="fa-solid fa-gear"></i>
                <span data-i18n="nav_settings">Settings</span>
            </button>
        </nav>

        <!-- Universal Modal Container -->
        <div id="modal-container" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Modal Title</h2>
                    <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- Dynamic Modal Content -->
                </div>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <!-- Scripts -->
    <script src="app.js" type="module"></script>
</body>
</html>
